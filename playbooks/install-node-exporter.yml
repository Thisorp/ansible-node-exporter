- name: Install node_exporter
  hosts: node_exporters
  become: yes

  tasks:
    - name: Install curl
      package:
        name: curl
        state: present

    - name: Create directories
      file:
        path: "{{ item }}"
        state: directory
        owner: setup
        group: setup
        mode: "0755"
      loop:
        - "{{ install_root }}"
        - "{{ package_dir }}"
        - "{{ bin_dir }}"
        - "{{ textfile_dir }}"
        - "{{ log_dir }}"

    - name: Copy package
      copy:
        src: "../files/{{ node_exporter_package_name }}"
        dest: "{{ package_dir }}/{{ node_exporter_package_name }}"

    - name: Extract package
      unarchive:
        src: "{{ package_dir }}/{{ node_exporter_package_name }}"
        dest: "{{ package_dir }}"
        remote_src: yes

    - name: Copy binary
      copy:
        src: "{{ package_dir }}/{{ node_exporter_extract_dir }}/node_exporter"
        dest: "{{ bin_dir }}/node_exporter"
        mode: "0755"
        remote_src: yes

    - name: Create service
      template:
        src: "../templates/node_exporter.service.j2"
        dest: /etc/systemd/system/node_exporter.service

    - name: Reload systemd
      command: systemctl daemon-reload

    - name: Enable and start
      systemd:
        name: node_exporter
        enabled: yes
        state: started
